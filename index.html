<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat with John Benedict</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #16213e;
      padding: 14px 20px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 { font-size: 1rem; color: #fff; }
    .header-info p  { font-size: 0.75rem; color: #aaa; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      background: #16213e;
      border: 1px solid #e94560;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      background: #2a2a2a;
      align-self: center;
      font-size: 0.78rem;
      color: #888;
      border-radius: 8px;
      padding: 6px 12px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
    }

    .typing span {
      width: 8px; height: 8px;
      background: #e94560;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    #input-area {
      padding: 14px 20px;
      background: #16213e;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      max-height: 120px;
    }

    #user-input:focus { border-color: #e94560; }

    #send-btn {
      padding: 10px 20px;
      background: #e94560;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 0.92rem;
      cursor: pointer;
      align-self: flex-end;
    }

    #send-btn:hover { background: #c73652; }
    #send-btn:disabled { background: #555; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="avatar">🚴</div>
  <div class="header-info">
    <h1>John Benedict Pamat Supnet</h1>
    <p>Biker from Mandug • 5'11" (NOT 6 feet!) • Pageant Enthusiast</p>
  </div>
</header>

<div id="chat-window">
  <div class="message system">Say something to John Benedict...</div>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Type a message..."></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  let history = [];

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message bot typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    div.id = 'typing-indicator';
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Server error');

      history.push({ role: 'assistant', content: data.reply });
      removeTyping();
      addMessage('bot', data.reply);
    } catch (err) {
      removeTyping();
      addMessage('system', `Error: ${err.message}`);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = userInput.scrollHeight + 'px';
  });
</script>

</body>
</html>
